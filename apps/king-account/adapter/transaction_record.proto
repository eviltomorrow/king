syntax = "proto3";

import "google/protobuf/wrappers.proto";

option go_package = "./;pb";
package account;

service Transaction {
    rpc Write(Record) returns (google.protobuf.StringValue);
}

message Record {
    string record_id = 1;
    enum Action {
        BUY = 0;
        SELL = 1;
    }
    Action action = 2;
    enum AssetsType {
        STOCK = 0;
    }
    AssetsType assets_type = 3;
    string assets_code = 4;
    double close_price = 5;
    int64 volume = 6;
    string datetime = 7;
    repeated Fee fee = 8;
}

message Fee {
    string record_id = 1;
    string item = 2;
    string money = 3;
}