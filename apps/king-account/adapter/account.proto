syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

option go_package = "./;pb";
package account;

service Account {
    rpc Find(google.protobuf.StringValue) returns (User);
    rpc List(PageSet) returns (Users);
    rpc Add(User) returns (google.protobuf.StringValue);
    rpc Remove(User) returns (google.protobuf.Empty);
    rpc Modify(User) returns (google.protobuf.Empty);
}

message PageSet {
    int64 page_no = 1;
    int64 page_size = 2;
}

message Users {
    repeated User users = 1;
}

message User {
    string uid = 1;
    string username = 2;
    string password = 3;
    string nick_name = 4;
    string phone = 5;
    string email = 6;
    int64 register_timestamp = 7;
    int32 status = 8;
}