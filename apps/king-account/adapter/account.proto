syntax = "proto3";

import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

option go_package = "./;pb";
package account;

service Account {
    rpc Register(RegisterReq) returns (google.protobuf.Empty);

    rpc Bind(BindReq) returns (google.protobuf.StringValue);
    rpc Confirm(ConfirmReq) returns (google.protobuf.Empty);

    rpc Get(google.protobuf.StringValue) returns (User);

    rpc Login(Credentials) returns (google.protobuf.StringValue);
    rpc LogOut(google.protobuf.StringValue) returns (google.protobuf.Empty);
}

message RegisterReq {
    string username = 1;
    string password = 2;
}

message BindReq {
    enum Type {
        EMAIL = 0;
        PHOME = 1;
    }
    Type type = 1;
    string value = 2;
}

message ConfirmReq {
    string bind_request_id = 1;
    string value = 2;
}

message Credentials {
    message ID {
        string Account = 1;
    }
    message Auth {
        enum Method {
            PASSWORD = 0;
            SMS = 1;
        }
        Method method = 1;
        string value = 2;
    }
    ID id = 1;
    Auth auth = 2;
}

message User {
    string id = 1;
    string username = 2;
    string nick_name = 4;
    string phone = 5;
    string email = 6;
    int32 status = 7;
    int64 register_datetime = 8;
}