syntax = "proto3";

import "google/protobuf/wrappers.proto";

option go_package = "./;pb";
package account;

service Account {
   rpc Add(User) returns (google.protobuf.StringValue);
}

message User {
    string uid = 1;
    string nick_name = 2;
    string username = 3;
    string phone = 4;
    string email = 5;
    string password = 6;
    string register_timestamp = 7;
    string status = 8;
}