syntax = "proto3";

import "google/protobuf/wrappers.proto";

option go_package = "./;pb";
package collector;

service Collector {
    // Crawl last metadata with specify source(sina, net126)
    rpc CrawlMetadata(google.protobuf.StringValue) returns (Counter){}
    // Store metadata to storage
    rpc StoreMetadata(google.protobuf.StringValue) returns (Counter){}
}

message Counter {
    int64 total = 1;
    int64 ignore = 2;   
}
