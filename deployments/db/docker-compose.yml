version: '3'

services:
  mongo:
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
      - LANG=zh_CN.UTF-8
    volumes:
      - $PWD/conf/mongo/:/etc/mongo/
      - $PWD/data/mongo/db:/var/lib/mongo/
      - $PWD/data/mongo/log:/var/log/mongo/
      - $PWD/data/mongo/init/init_mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
      - /etc/localtime:/etc/localtime:ro
      - /usr/share/zoneinfo:/usr/share/zoneinfo/
    command: ["--auth","--config","/etc/mongo/mongod.conf"]
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/mongo:6.0.6
    container_name: mongo
    # ports:
    #   - 27017:27017
    expose:
      - "27017"

  mysql:
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - $PWD/conf/mysql/:/etc/mysql/conf.d/
      - $PWD/data/mysql/db:/var/lib/mysql/
      - $PWD/data/mysql/log:/var/log/mysql/
      - $PWD/data/mysql/init:/docker-entrypoint-initdb.d/
      - /run/mysqld:/run/mysqld/
      - /usr/share/zoneinfo:/usr/share/zoneinfo/
      - /etc/localtime:/etc/localtime:ro
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/mysql:8.0.33
    container_name: mysql
    # ports:
    #   - 3306:3306
    expose:
      - "3306"
    privileged: true

  etcd:
    restart: always
    environment:               
      - ALLOW_NONE_AUTHENTICATION=yes                                   
      - ETCD_ADVERTISE_CLIENT_URLS=http://0.0.0.0:2379          
      - ETCDCTL_API=3                                            
    volumes:
      - $PWD/data/etcd:/etcd-data/                       
      - /etc/localtime:/etc/localtime:ro
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/etcd:3.4.26
    container_name: etcd                
    # ports:                   
    #   - "2379:2379"
    #   - "2380:2380"
    expose:
      - "2379"
      - "2380"

  # rabbitmq:
  #   restart: always
  #   environment:               
  #     - RABBITMQ_DEFAULT_USER=admin
  #     - RABBITMQ_DEFAULT_PASS=admin123                                        
  #   volumes:
  #     - $PWD/data/rabbitmq/db:/var/lib/rabbitmq/
  #     - $PWD/data/rabbitmq/log:/var/log/rabbitmq/
