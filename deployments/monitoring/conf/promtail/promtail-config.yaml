server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: king-collector
    pipeline_stages:
    - json:
       expressions:
         level: level
         time: time
         caller: caller
         message: message
         error: error

    static_configs:
      - targets:
          - localhost
        labels:
          app: king-collector
          type: data 
          __path__: /log/king-collector/data.log

      - targets:
          - localhost
        labels:
          app: king-collector
          type: access 
          __path__: /log/king-collector/access.log

      - targets:
          - localhost
        labels:
          app: king-collector
          type: panic
          __path__: /log/king-collector/panic.log

  - job_name: king-email
    pipeline_stages:
    - json:
       expressions:
         level: level
         time: time
         caller: caller
         message: message
         error: error

    static_configs:
      - targets:
          - localhost
        labels:
          app: king-email
          type: data 
          __path__: /log/king-email/data.log

      - targets:
          - localhost
        labels:
          app: king-email
          type: access 
          __path__: /log/king-email/access.log

      - targets:
          - localhost
        labels:
          app: king-email
          type: panic 
          __path__: /log/king-email/panic.log

  - job_name: king-repository
    pipeline_stages:
    - json:
       expressions:
         level: level
         time: time
         caller: caller
         message: message
         error: error
    static_configs:
      - targets:
          - localhost
        labels:
          app: king-repository
          type: data 
          __path__: /log/king-repository/data.log

      - targets:
          - localhost
        labels:
          app: king-repository
          type: access 
          __path__: /log/king-repository/access.log

      - targets:
          - localhost
        labels:
          app: king-repository
          type: panic 
          __path__: /log/king-repository/panic.log
