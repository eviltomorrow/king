version: '3'
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.83.0
    container_name: otel-collector
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./conf/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    # ports:
    #   - "1888:1888"   # pprof extension
    #   - "8888:8888"   # Prometheus metrics exposed by the collector
    #   - "8889:8889"   # Prometheus exporter metrics
    #   - "13133:13133" # health_check extension
    #   - "4317:4317"   # OTLP gRPC receiver
    #   - "55679:55679" # zpages extension
    expose:
      - "1888"
      - "8888"
      - "8889"
      - "13133"
      - "4317"
      - "55679"
    depends_on:
      - jaeger-collector

  jaeger-collector:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/jaeger-collector:1.47
    container_name: jaeger-collector
    command:
      - "--cassandra.keyspace=jaeger_v1_dc1"
      - "--cassandra.servers=cassandra"
      - "--collector.zipkin.host-port=:9411"
      - "--collector.otlp.enabled=false"
    environment:
      - SAMPLING_CONFIG_TYPE=adaptive
      - SPAN_STORAGE_TYPE=cassandra
    # ports:
    #   - "14269:14269"
    #   - "14268:14268"
    #   - "14250:14250"
    #   - "9411:9411"
    expose:
      - "14269"
      - "14268"
      - "14250"
      - "9411"
    restart: always
    depends_on:
      - cassandra-schema

  jaeger-query:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/jaeger-query:1.47
    container_name: jaeger-query
    command:
      ["--cassandra.keyspace=jaeger_v1_dc1", "--cassandra.servers=cassandra"]
    environment:
      - SPAN_STORAGE_TYPE=cassandra
      - SAMPLING_CONFIG_TYPE=adaptive
      - SAMPLING_STORAGE_TYPE=cassandra
    ports:
    #   - "16685:16685"
      - "16686:16686"
    #   - "16687"
    expose:
      - "16685"
      - "16686"
      - "16687"
    restart: always
    depends_on:
      - cassandra-schema

  cassandra:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/cassandra:4.1.3
    restart: on-failure
    container_name: cassandra
    # ports:
    #   - "9042:9042"
    expose:
      - "9402"
    volumes:
      - ./data/cassandra/db:/var/lib/cassandra
      - ./data/cassandra/log:/var/log/cassandra

  cassandra-schema:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/jaeger-cassandra-schema:1.47
    restart: on-failure
    container_name: cassandra-schema
    depends_on:
      - cassandra

  loki:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/loki:2.8.4
    container_name: loki
    # ports:
    #   - "3100:3100"
    #   - "9095:9095"
    expose:
      - "3100"
      - "9095"
    command: -config.file=/etc/loki/config/local-config.yaml
    volumes:
      - ./conf/loki:/etc/loki/config
      - ./data/loki/data/index:/opt/loki/index
      - ./data/loki/data/chunks:/opt/loki/chunks
      - ./data/loki/log:/var/log
    restart: always

  promtail:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/promtail:2.8.4
    container_name: promtail
    # ports:
    #   - "9080:9080"
    expose:
      - "9080"
    volumes:
      - ./data/promtail/log:/var/log
      - ./conf/promtail:/etc/promtail/config
      - ${APPS_HOME}/data/king-collector/log:/log/king-collector
      - ${APPS_HOME}/data/king-email/log:/log/king-email
      - ${APPS_HOME}/data/king-repository/log:/log/king-repository
    command: -config.file=/etc/promtail/config/promtail-config.yaml
    restart: always

  prometheus:
    container_name: prometheus
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/prometheus:2.46.0
    volumes:
      - ./conf/prometheus:/etc/prometheus/
      - ./data/prometheus/data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    # ports:
    #   - "9090:9090"
    expose:
      - "9090"
    restart: always

  node-exporter:
    container_name: node-exporter
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/node-exporter:1.6.1
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /:/host:ro,rslave
    command: 
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc' 
      - '--path.sysfs=/host/sys'
      - --collector.filesystem.ignored-mount-points
      - "^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)"
    # ports:
    #   - "9100:9100"
    expose:
      - "9100"
    restart: always

  grafana:
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/grafana:10.0.3
    container_name: grafana
    ports:
      - "3000:3000"
    expose:
      - "3000"
    volumes:
      - ./conf/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./data/grafana/data:/var/lib/grafana
      - ./data/grafana/log:/var/log/grafana
      - ./conf/grafana/provisioning:/etc/grafana/provisioning
    restart: always

networks:
  default:
    name: net-king
    external: true