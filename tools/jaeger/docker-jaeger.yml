version: "3"
services:
  jaeger-collector:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/jaeger-collector:1.47
    container_name: jaeger-collector
    command:
      - "--cassandra.keyspace=jaeger_v1_dc1"
      - "--cassandra.servers=cassandra"
      - "--collector.zipkin.host-port=:9411"
    environment:
      - SAMPLING_CONFIG_TYPE=adaptive
      - SPAN_STORAGE_TYPE=cassandra
    ports:
      - "14269:14269"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
      - "4317:4317"
      - "4318:4318"
    restart: on-failure
    depends_on:
      - cassandra-schema
    networks:
      - net-king

  jaeger-query:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/jaeger-query:1.47
    container_name: jaeger-query
    command:
      ["--cassandra.keyspace=jaeger_v1_dc1", "--cassandra.servers=cassandra"]
    environment:
      - SPAN_STORAGE_TYPE=cassandra
      - SAMPLING_CONFIG_TYPE=adaptive
      - SAMPLING_STORAGE_TYPE=cassandra
    ports:
      - "16685:16685"
      - "16686:16686"
      - "16687"
    restart: on-failure
    depends_on:
      - cassandra-schema
    networks:
      - net-king

  jaeger-agent:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/jaeger-agent:1.47
    container_name: jaeger-agent
    command: ["--reporter.grpc.host-port=jaeger-collector:14250"]
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
    restart: on-failure
    depends_on:
      - jaeger-collector
    networks:
      - net-king

  cassandra:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/cassandra:4.1.3
    container_name: cassandra
    ports:
      - "9042:9042"
    volumes:
      - "./data/cassandra/db:/var/lib/cassandra"
      - "./data/cassandra/logs:/var/log/cassandra"
    networks:
      - net-king

  cassandra-schema:
    image: registry.cn-beijing.aliyuncs.com/eviltomorrow/jaeger-cassandra-schema:1.47
    container_name: cassandra-schema
    depends_on:
      - cassandra
    networks:
      - net-king

networks:
  net-king:
    name: jaeger
    driver: bridge
